<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>망상그곳~</title>
  <style>
    :root {
      --bg: #eef4f0;
      --card: #ffffff;
      --ink: #17211b;
      --muted: #69786f;
      --line: #d7e3dc;
      --green: #0d815b;
      --green-dark: #0a5f44;
      --soft: #e9f7f0;
      --warn: #b85c00;
      --shadow: 0 10px 26px rgba(25, 48, 38, .10);
      --mono: "Consolas", "D2Coding", "Courier New", monospace;
      --sans: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(13, 129, 91, .12), transparent 210px),
        var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      background: rgba(238, 244, 240, .92);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .brand-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid #b9e2d0;
      border-radius: 999px;
      background: #edfff6;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #21bf7b;
      box-shadow: 0 0 0 5px rgba(33, 191, 123, .16);
    }

    .top-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .online-status {
      border-color: #d6e0dc;
      background: #ffffff;
      color: #273b31;
    }

    .online-status::before {
      background: #70a7ff;
      box-shadow: 0 0 0 5px rgba(112, 167, 255, .15);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .95);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .controls {
      display: grid;
      gap: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      color: #172b22;
      font-size: 15px;
      font-weight: 900;
    }

    .field-icon {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 10px;
      background: rgba(13, 129, 91, .09);
      font-size: 15px;
      flex: 0 0 auto;
    }

    .field-name {
      flex: 1 1 auto;
      min-width: 0;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .chip,
    .mini-btn,
    .seg-btn,
    .action-btn {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfb;
      color: #273b31;
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .chip {
      flex: 0 0 auto;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .chip.active,
    .seg-btn.active {
      border-color: var(--green);
      background: var(--green);
      color: white;
    }

    .chip::before {
      content: "";
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      display: inline-block;
      background: currentColor;
      -webkit-mask: var(--facility-icon) center / contain no-repeat;
      mask: var(--facility-icon) center / contain no-repeat;
    }

    document.querySelector(".brand-mark img")?.setAttribute("src", BRAND_ICON_SRC);

    const CATEGORIES = [
      { code: "1300", name: "든바다" },
      { code: "1400", name: "난바다" },
      { code: "1500", name: "허허바다" },
      { code: "1600", name: "자동차캠핑장" }
    ];

    const CONFIG = {
      eventsUrl: "/api/events",
      statusUrl: "/api/status",
      configUrl: "/api/config",
      maxDays: 40
    };

    let rows = [];
    const firstSeen = new Map();
    let monitorTimer = null;
    let isProcessing = false;
    let lastError = "";
    const maxDays = CONFIG.maxDays;
    const formatDate = date => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    };
    const dateFromKey = key => {
      const [y, m, d] = key.split("-").map(Number);
      return new Date(y, m - 1, d);
    };
    const addDays = (key, days) => {
      const date = dateFromKey(key);
      date.setDate(date.getDate() + days);
      return formatDate(date);
    };

    const today = formatDate(new Date());
    const startOpen = addDays(today, 1);
    const endOpen = addDays(today, maxDays);
    let mode = "open";
    let interval = "60";
    localStorage.removeItem("mangsangActiveResetAt");
    localStorage.removeItem("mangsangHistoryResetAt");
    let scanCount = 0;
    let scanBase = Number(localStorage.getItem("mangsangScanBase") || 0);
    let historyResetAt = 0;
    let selected = new Set(["든바다", "난바다", "허허바다", "자동차캠핑장"]);

    const activeRows = document.querySelector("#activeRows");
    const firstRows = document.querySelector("#firstRows");
    const dateStart = document.querySelector("#dateStart");
    const dateEnd = document.querySelector("#dateEnd");
    const chips = [...document.querySelectorAll(".chip")];
    const facilityActionButtons = [...document.querySelectorAll("[data-facility-action]")];
    const modeButtons = [...document.querySelectorAll("[data-date-mode]")];
    const onlineStatus = document.querySelector("#onlineStatus");

    dateStart.min = startOpen;
    dateStart.max = endOpen;
    dateStart.value = startOpen;
    dateEnd.min = startOpen;
    dateEnd.max = endOpen;
    dateEnd.value = endOpen;

    function currentRange() {
      return {
        start: mode === "custom" ? dateStart.value : startOpen,
        end: mode === "custom" ? dateEnd.value : endOpen
      };
    }

    function dayCount() {
      const { start, end } = currentRange();
      const dayMs = 24 * 60 * 60 * 1000;
      return Math.max(0, Math.round((dateFromKey(end) - dateFromKey(start)) / dayMs) + 1);
    }

    function visibleRows(source = rows, options = {}) {
      const { start, end } = currentRange();
      const selectedNames = selected.size
        ? selected
        : new Set(CATEGORIES.map(item => item.name));
      return source.filter(row => {
        const facilityOk = selectedNames.has(normalizeFacilityName(row.name));
        const dateOk = options.ignoreDate || mode !== "custom" || (row.date >= start && row.date <= end);
        return facilityOk && dateOk;
      });
    }

    function safeText(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function setText(selector, value) {
      const target = document.querySelector(selector);
      if (target) target.textContent = value;
    }

    function setMonitorState(value, color) {
      const target = document.querySelector("#monitorState");
      if (!target) return;
      target.textContent = value;
      target.style.color = color;
    }

    function header(type = "active") {
      if (type === "history") {
        return `
          <div class="grid-head">
            <span>날짜</span>
            <span>시설</span>
            <span>객실</span>
            <span>감지</span>
            <span>종류</span>
            <span>상태</span>
          </div>
        `;
      }
      return `
        <div class="grid-head">
          <span>날짜</span>
          <span>시설</span>
          <span>객실</span>
          <span>감지</span>
          <span>예상</span>
          <span>남은시간</span>
        </div>
      `;
    }

    function expectedReadyMs(row) {
      const detectedMs = Number(row.detectedMs || 0);
      return detectedMs > 0 ? detectedMs + 2 * 60 * 60 * 1000 : 0;
    }

    function formatClock(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleTimeString("ko-KR", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatRemaining(targetMs) {
      if (!targetMs) return "-";
      const remaining = targetMs - Date.now();
      if (remaining <= 0) return "가능";
      const totalMinutes = Math.ceil(remaining / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours > 0 && minutes > 0) return `${hours}시간 ${minutes}분`;
      if (hours > 0) return `${hours}시간`;
      return `${minutes}분`;
    }

    function remainingClass(targetMs) {
      if (!targetMs) return "";
      const remaining = targetMs - Date.now();
      return remaining <= 30 * 60 * 1000 ? "remaining-soon" : "";
    }

    function rowMarkup(row) {
      const date = safeText(String(row.date || "-").replace(/^\d{4}-/, ""));
      const name = safeText(row.name || "-");
      const room = safeText(row.room || "-");
      const timeText = safeText(row.time || "-");
      const readyMs = expectedReadyMs(row);
      const expectedText = safeText(formatClock(readyMs));
      const remainingText = safeText(formatRemaining(readyMs));
      const remainingClassName = remainingClass(readyMs);
      return `

          <span>${room}</span>
          <span>${timeText}</span>
          <span>${expectedText}</span>
          <span class="${remainingClassName}">${remainingText}</span>
        </div>
      `;
    }

    function historyKind(row) {
      const type = String(row.eventType || row.event_type || "").toLowerCase();
      const raw = `${row.status || ""} ${row.state || ""} ${row.message || ""}`;
      if (type.includes("available") || raw.includes("예약 가능") || raw.includes("예약가능")) return "예약가능";
      return "취소진행중";
    }

    function historyKindClass(row) {
      return historyKind(row) === "예약가능" ? "available" : "canceling";
    }

    function statusText(row) {
      const raw = String(row.status || row.state || "").trim();
      const message = String(row.message || "").trim();
      if (raw && raw !== "Y" && raw !== "N") return raw;
      if (message.includes("종료")) {
        const match = message.match(/종료s*[→>-]s*([^|]+)/);
        return match ? `종료 → ${match[1].trim()}` : "종료";
      }
      if (raw === "Y" || historyKind(row) === "예약가능") return "종료 → 예약 가능";
      return "발생";
    }

    function historyRowMarkup(row) {
      const date = safeText(String(row.date || "-").replace(/^\d{4}-/, ""));
      const name = safeText(row.name || "-");
      const room = safeText(row.room || "-");
      const timeText = safeText(row.time || "-");
      const kind = safeText(historyKind(row));
      const kindClass = safeText(historyKindClass(row));
      const state = safeText(statusText(row));
      return `
        <div class="grid-row">
          <time>${date}</time>
          <strong>${name}</strong>
          <span>${room}</span>
          <span>${timeText}</span>
          <span class="history-kind ${kindClass}">${kind}</span>
          <span class="history-status">${state}</span>
        </div>
      `;
    }

    function paintList(target, data, emptyText, type = "active") {
      target.classList.remove("console-list");
      target.classList.toggle("history-grid", type === "history");
      const markup = type === "history" ? historyRowMarkup : rowMarkup;
      target.innerHTML = data.length
        ? `${header(type)}${data.map(markup).join("")}`
        : `<div class="empty">${emptyText}</div>`;
    }

    function keyOf(row) {
      return `${row.date}|${row.name}|${row.room}|${row.fcltyCode}|${row.fcltyTyCode}|${row.resveNoCode}`;
    }

    function uniqueRows(source) {
      const map = new Map();
      source.forEach(row => {
        const key = keyOf(row);
        if (!map.has(key)) map.set(key, row);
      });
      return [...map.values()];
    }

    function beep() {
      try {
        new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg").play();
      } catch (e) {}
    }

    function normalizeFacilityName(value) {
      const name = String(value || "-").trim();
      if (name === "1600") return "자동차캠핑장";
      if (name === "1500") return "허허바다";
      if (name === "1400") return "난바다";
      if (name === "1300") return "든바다";
      if (name.includes("자동차") || name.includes("캠핑")) return "자동차캠핑장";
      if (name.includes("허허")) return "허허바다";
      if (name.includes("난바다")) return "난바다";
      if (name.includes("든바다")) return "든바다";
      return name;
    }

    function normalizeFacilityFromItem(item) {
      const candidates = [
        item.category,
        item.categoryCode,
        item.catCode,
        item.name,
        item.facility,
        item.facilityName,
        item.fcltyNm,
        item.fcltyCode,
        item.fcltyTyCode,
        item.facilityCode,
        item.facilityTypeCode,
        item.roomName,
        item.room,
        item.message,
        item.raw
      ];
      for (const value of candidates) {
        const normalized = normalizeFacilityName(value);
        if (["든바다", "난바다", "허허바다", "자동차캠핑장"].includes(normalized)) {
          return normalized;
        }
      }
      return normalizeFacilityName(item.category || item.name || "-");
    }

    function normalizeTime(value) {
      if (!value) return new Date().toLocaleTimeString();
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleTimeString("ko-KR", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function timestampOf(value) {
      if (!value) return Date.now();
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? 0 : date.getTime();
    }

    async function refreshOnlineCount() {
      if (!onlineStatus) return;
      try {
        const res = await fetch("/api/presence", { method: "POST", cache: "no-store" });
        if (res.status === 401) {
          location.href = "/login";
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        onlineStatus.textContent = `접속 ${payload.online ?? "-"}명`;
      } catch {
        onlineStatus.textContent = "접속 확인중";
      }
    }

    async function loadRemoteConfig() {
      try {
        const res = await fetch(CONFIG.configUrl, { cache: "no-store" });
        if (!res.ok) return;
        const payload = await res.json();
        const sec = Number(payload.config?.intervalSec || 60);
        if ([10, 30, 60, 300].includes(sec)) interval = String(sec);
      } catch {}
    }

    function normalizeServerItem(item) {
      const category = normalizeFacilityFromItem(item);
      const room = String(item.roomName || item.room || "-").replace(/^자동차캠핑장\s*/, "");
      const detectedAt = item.detectedAt || item.time || "";
      const status = String(item.status || item.state || "");
      const message = String(item.message || "");
      const eventType = String(
        item.eventType ||
        item.event_type ||
        ((status + " " + message).includes("예약 가능") || (status + " " + message).includes("예약가능") ? "available" : "canceling")
      );
      return {
        date: String(item.date || "-"),
        name: category,
        room,
        time: normalizeTime(detectedAt),
        detectedMs: timestampOf(detectedAt),
        fcltyCode: String(item.fcltyCode || ""),
        fcltyTyCode: String(item.fcltyTyCode || ""),
        resveNoCode: String(item.resveNoCode || ""),
        status,
        state: String(item.state || status),
        eventType,
        event_type: eventType,
        message
      };
    }

    async function scanOnce() {
      if (isProcessing) return;
      isProcessing = true;
      scanCount++;
      lastError = "";
      setMonitorState("조회중", "var(--warn)");
      render();

      try {
        const res = await fetch(CONFIG.eventsUrl, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        const active = Array.isArray(payload.active) ? payload.active.map(normalizeServerItem) : [];
        const events = Array.isArray(payload.events) ? payload.events.map(normalizeServerItem) : [];
        const serverMonitor = payload.status?.monitor || {};
        lastError = String(payload.monitorError || "").trim();
        const serverInterval = Number(payload.config?.intervalSec || serverMonitor.intervalSec || interval);
        if ([10, 30, 60, 300].includes(serverInterval)) interval = String(serverInterval);

        rows = uniqueRows(active).sort((a, b) => a.date.localeCompare(b.date) || a.name.localeCompare(b.name, "ko"));

        uniqueRows(events.length ? events : rows).forEach(row => {
          if (historyResetAt && row.detectedMs <= historyResetAt) return;
          const key = keyOf(row);
          if (!firstSeen.has(key)) {
            firstSeen.set(key, row);
          }
        });

        scanCount = Number(serverMonitor.count || scanCount);
        setMonitorState(lastError ? "오류" : "정상", lastError ? "#d53939" : "var(--green)");
      } catch (e) {
        lastError = "서버대기";
        setMonitorState("오류", "#d53939");
      } finally {
        isProcessing = false;
        render();
      }
    }

    function startMonitor() {
      if (monitorTimer) clearInterval(monitorTimer);
      scanOnce();
      monitorTimer = setInterval(scanOnce, Number(interval) * 1000);
    }

    function render() {
      const data = visibleRows(rows, { ignoreDate: true });
      const firstData = visibleRows(
        [...firstSeen.values()].sort((a, b) => a.date.localeCompare(b.date) || a.name.localeCompare(b.name, "ko")),
        { ignoreDate: true }
      );
      chips.forEach(chip => {
        const isActive = selected.has(chip.dataset.facility);
        chip.classList.toggle("active", isActive);
        chip.setAttribute("aria-pressed", String(isActive));
      });
      facilityActionButtons.forEach(button => {
        const isAll = button.dataset.facilityAction === "all" && selected.size === CATEGORIES.length;
        const isNone = button.dataset.facilityAction === "none" && selected.size === 0;
        const isActive = isAll || isNone;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
      modeButtons.forEach(button => {
        const isActive = button.dataset.dateMode === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
      dateStart.disabled = mode !== "custom";
      dateEnd.disabled = mode !== "custom";
      paintList(activeRows, data, "현재 살아있는 취소분이 없습니다.");
      paintList(firstRows, firstData, "누적 감지 기록이 없습니다.", "history");
      setText("#activeCount", data.length);
      setText("#scanCount", `${Math.max(0, scanCount - scanBase)}회`);
      const targetFacilityCount = selected.size || CATEGORIES.length;
      setText("#targetCount", targetFacilityCount * Math.max(0, dayCount() - 1));
    }

    document.querySelector("[data-facility-action='all']").addEventListener("click", () => {
      selected = new Set(["든바다", "난바다", "허허바다", "자동차캠핑장"]);
      render();
    });

    document.querySelector("[data-facility-action='none']").addEventListener("click", () => {
      selected = new Set();
      render();
    });

    chips.forEach(chip => {
      chip.addEventListener("click", () => {
        const name = chip.dataset.facility;
        selected.has(name) ? selected.delete(name) : selected.add(name);
        render();
      });
    });

    modeButtons.forEach(button => {
      button.addEventListener("click", () => {
        mode = button.dataset.dateMode;
        render();
      });
    });

    [dateStart, dateEnd].forEach(input => {
      input.addEventListener("focus", () => {
        mode = "custom";
        render();
      });
      input.addEventListener("change", () => {
        mode = "custom";
        if (dateStart.value > dateEnd.value) {
          input === dateStart ? dateEnd.value = dateStart.value : dateStart.value = dateEnd.value;
        }
        render();
      });
    });

    loadRemoteConfig().finally(() => {
      render();
      startMonitor();
    });
    refreshOnlineCount();
    setInterval(refreshOnlineCount, 15000);
    setInterval(() => {
      if (rows.length || firstSeen.size) render();
    }, 1000);
  </script>
</body>
</html>
